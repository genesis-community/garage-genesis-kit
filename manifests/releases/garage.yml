# The garage BOSH release is not yet published to a public blobstore. Build it
# from the source repo (src/releases/garage) and upload to the director before
# deploying:
#
#   cd src/releases/garage
#   bosh create-release --force --name garage --version 0.1.6 --tarball=/tmp/garage-0.1.6.tgz
#   genesis <env> bosh upload-release /tmp/garage-0.1.6.tgz
#
# Once a public release is published, add `url:` and `sha1:` here so Genesis can
# upload it automatically.
releases:
- name:    garage
  version: 0.1.6
