---
name:    garage
version: 0.0.1

author:
  - Wayne Seguin <weseguin@fivetwenty.io>
code:    https://github.com/genesis-community/garage-genesis-kit
docs:    https://genesisproject.io/docs/

genesis_version_min: 3.1.0

services:
- s3

supports:
- aws
- azure
- gcp
- openstack
- pve
- vsphere
- stackit

required_configs:
  blueprint: []

credentials:
  base:
    # Garage cluster credentials. Generated on `genesis add-secrets`; rotate
    # the rpc_secret and admin_token with the reset-credentials (r) addon.
    credentials:
      access_key:  random 32 allowed-chars 0-9a-f   # 32-hex suffix of GK<access_key>
      secret_key:  random 64 allowed-chars 0-9a-f   # S3 secret key
      rpc_secret:  random 64 allowed-chars 0-9a-f   # shared cluster RPC secret
      admin_token: random 32 allowed-chars 0-9a-f   # admin API bearer token

certificates:
  base:
    certs:
      ca: { valid_for: 10y }  # Reserved for future external client verification.
